<!DOCTYPE html>
<html lang="cs">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23633cff'/><text x='16' y='22' font-size='14' fill='white' text-anchor='middle' font-family='sans-serif'>G</text></svg>">
	<title>gIVEMEGAME.IO — Login</title>
	<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
	<style>
		*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

		body {
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			font-family: 'VT323', monospace;
			background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
			color: #fff;
			overflow: hidden;
		}

		/* Animated background grid */
		body::before {
			content: '';
			position: fixed;
			top: 0; left: 0; right: 0; bottom: 0;
			background-image:
				linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
				linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
			background-size: 40px 40px;
			animation: grid-scroll 20s linear infinite;
			z-index: 0;
		}
		@keyframes grid-scroll {
			0% { transform: translate(0, 0); }
			100% { transform: translate(40px, 40px); }
		}

		.login-card {
			position: relative;
			z-index: 1;
			background: rgba(15, 12, 41, 0.85);
			border: 2px solid rgba(255, 255, 255, 0.1);
			border-radius: 16px;
			padding: 32px 24px;
			max-width: 420px;
			width: 90%;
			text-align: center;
			box-shadow:
				0 0 40px rgba(131, 56, 236, 0.2),
				0 0 80px rgba(58, 134, 255, 0.1);
			backdrop-filter: blur(10px);
			margin: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
		}
		@media (min-width: 480px) {
			.login-card { padding: 48px 40px; }
		}

		.brand {
			font-family: 'Press Start 2P', monospace;
			font-size: 20px;
			margin-bottom: 8px;
			line-height: 1.4;
		}
		.brand-give { color: #ff006e; }
		.brand-me { color: #ffbe0b; }
		.brand-game { color: #3a86ff; }
		.brand-io { color: #8338ec; }

		.tagline {
			font-size: 18px;
			color: rgba(255,255,255,0.5);
			margin-bottom: 32px;
		}

		.btn-login {
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 12px;
			width: 100%;
			min-height: 48px;
			padding: 14px 24px;
			border: 2px solid rgba(255,255,255,0.2);
			border-radius: 10px;
			background: rgba(255,255,255,0.05);
			color: #fff;
			font-family: 'VT323', monospace;
			font-size: 20px;
			cursor: pointer;
			transition: all 0.2s;
			margin-bottom: 12px;
			-webkit-tap-highlight-color: transparent;
			touch-action: manipulation;
		}
		.btn-login:hover {
			background: rgba(255,255,255,0.12);
			border-color: rgba(255,255,255,0.4);
			transform: translateY(-2px);
			box-shadow: 0 4px 20px rgba(131, 56, 236, 0.3);
		}
		.btn-login:active {
			transform: translateY(0);
		}

		.btn-google {
			border-color: rgba(66, 133, 244, 0.4);
		}
		.btn-google:hover {
			border-color: #4285f4;
			box-shadow: 0 4px 20px rgba(66, 133, 244, 0.3);
		}

		.google-icon {
			width: 22px;
			height: 22px;
		}

		.login-footer {
			margin-top: 24px;
			font-size: 14px;
			color: rgba(255,255,255,0.3);
		}
		.login-footer a {
			color: #8338ec;
			text-decoration: none;
		}

		.error-msg {
			color: #ef4444;
			font-size: 14px;
			margin-top: 12px;
			display: none;
		}

		.btn-skip {
			display: inline-block;
			margin-top: 16px;
			padding: 10px 16px;
			font-size: 14px;
			color: rgba(255,255,255,0.6);
			text-decoration: none;
			border: 1px solid rgba(255,255,255,0.2);
			border-radius: 8px;
			transition: all 0.2s;
			-webkit-tap-highlight-color: transparent;
		}
		.btn-skip:hover, .btn-skip:active {
			color: rgba(255,255,255,0.9);
			border-color: rgba(255,255,255,0.4);
		}

		.login-setup-hint {
			margin-top: 20px;
			text-align: left;
			font-size: 12px;
			color: rgba(255,255,255,0.6);
		}
		.login-setup-hint details { cursor: pointer; }
		.login-setup-hint summary { padding: 8px 0; }
		.login-setup-hint code {
			display: block;
			word-break: break-all;
			background: rgba(0,0,0,0.3);
			padding: 8px 10px;
			border-radius: 6px;
			margin: 8px 0;
			font-size: 11px;
		}
		.btn-copy-url {
			padding: 6px 12px;
			font-size: 12px;
			background: rgba(131, 56, 236, 0.4);
			border: 1px solid rgba(255,255,255,0.2);
			border-radius: 6px;
			color: #fff;
			cursor: pointer;
		}

		/* Loading state */
		.btn-login.loading {
			pointer-events: none;
			opacity: 0.6;
		}

		/* Floating particles */
		.particle {
			position: fixed;
			border-radius: 50%;
			pointer-events: none;
			z-index: 0;
			animation: float-up linear infinite;
		}
		@keyframes float-up {
			0% { transform: translateY(100vh) scale(0); opacity: 0; }
			20% { opacity: 0.6; }
			80% { opacity: 0.3; }
			100% { transform: translateY(-10vh) scale(1); opacity: 0; }
		}
	</style>
</head>
<body>

	<div class="login-card">
		<div class="brand">
			<span class="brand-give">gIVE</span><span class="brand-me">ME</span><span class="brand-game">GAME</span><span class="brand-io">.IO</span>
		</div>
		<div class="tagline">Educational Game Generator</div>

		<button class="btn-login btn-google" id="btn-google" type="button">
			<svg class="google-icon" viewBox="0 0 24 24">
				<path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
				<path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
				<path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
				<path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
			</svg>
			Sign in with Google
		</button>

		<div class="error-msg" id="error-msg"></div>

		<a href="/index.html" class="btn-skip" id="btn-skip">Hrať bez prihlásenia</a>

		<div class="login-setup-hint" id="login-setup-hint">
			<details open>
				<summary>🔧 Presmerovanie na localhost? Pridaj túto URL do Supabase:</summary>
				<p style="margin:8px 0 4px;font-size:11px;opacity:0.9;">Supabase Dashboard → Authentication → URL Configuration → Redirect URLs → Add URL</p>
				<code id="redirect-url-display"></code>
				<button type="button" class="btn-copy-url" id="btn-copy-url">Skopírovať</button>
			</details>
		</div>

		<div class="login-footer">
			<span class="brand-give" style="font-family:'Press Start 2P';font-size:8px;">IW</span>
			&copy; 2026 IndiWeb
		</div>
	</div>

	<!-- Floating particles -->
	<script>
		for (let i = 0; i < 20; i++) {
			const p = document.createElement('div');
			p.className = 'particle';
			const size = 2 + Math.random() * 4;
			const colors = ['#ff006e', '#ffbe0b', '#3a86ff', '#8338ec', '#06d6a0'];
			p.style.cssText = `
				width: ${size}px; height: ${size}px;
				left: ${Math.random() * 100}%;
				background: ${colors[Math.floor(Math.random() * colors.length)]};
				animation-duration: ${8 + Math.random() * 12}s;
				animation-delay: ${Math.random() * 10}s;
			`;
			document.body.appendChild(p);
		}
	</script>

	<!-- Supabase Auth SDK -->
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
	<script>
	(function() {
		'use strict';

		const SUPABASE_URL = 'https://vhpkkbixshfyytohkruv.supabase.co';
		const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZocGtrYml4c2hmeXl0b2hrcnV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMDAzNzcsImV4cCI6MjA4ODY3NjM3N30.umrrhSqC9LW2Wlcs5y4uCViVfZmqyHcMbaPQaQiMbR0';

		let supabase = null;
		try {
			if (window.supabase) {
				supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
					auth: { detectSessionInUrl: true, persistSession: true }
				});
			}
		} catch (e) {
			console.error('[Login] Supabase init failed:', e);
		}

		function showError(msg) {
			const el = document.getElementById('error-msg');
			if (el) { el.textContent = msg; el.style.display = 'block'; }
		}

		function resetGoogleButton() {
			const btn = document.getElementById('btn-google');
			if (!btn) return;
			btn.classList.remove('loading');
			btn.disabled = false;
			btn.innerHTML = '<svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Sign in with Google';
		}

		async function saveUserAndRedirect(user) {
			// Ulož profil do Supabase (ak existuje tabuľka profiles)
			if (supabase) {
				const { error } = await supabase.from('profiles').upsert({
					id: user.id,
					display_name: user.user_metadata?.full_name || user.email?.split('@')[0] || 'Player',
					avatar_url: user.user_metadata?.avatar_url || null,
					updated_at: new Date().toISOString()
				}, { onConflict: 'id' });
				if (error) console.warn('[Login] Profile upsert:', error.message);
			}
			sessionStorage.setItem('givemegame_user', JSON.stringify({
				uid: user.id,
				name: user.user_metadata?.full_name || user.email?.split('@')[0] || 'Player',
				email: user.email,
				photo: user.user_metadata?.avatar_url || null
			}));
			// Krátke oneskorenie — Supabase musí uložiť session do localStorage pred redirectom
			await new Promise(r => setTimeout(r, 150));
			window.location.href = '/index.html';
		}

		function checkOAuthError() {
			const hash = window.location.hash?.slice(1) || '';
			if (!hash) return false;
			const params = new URLSearchParams(hash);
			if (params.get('error_code') || params.get('error_description')) {
				showError(params.get('error_description') || 'Chyba prihlásenia');
				window.history.replaceState(null, '', window.location.pathname + window.location.search);
				return true;
			}
			return false;
		}

		// Google login — vždy definované, reaguje na klik
		async function loginGoogle() {
			const btn = document.getElementById('btn-google');
			const errEl = document.getElementById('error-msg');
			if (btn) { btn.classList.add('loading'); btn.disabled = true; }
			if (errEl) errEl.style.display = 'none';

			if (!supabase) {
				resetGoogleButton();
				showError('Supabase sa nenačítal. Skontrolujte sieť alebo vypnite blokovanie reklám.');
				return;
			}

			const origin = window.location.origin;
			if (!origin || origin === 'null' || origin.startsWith('file:')) {
				resetGoogleButton();
				showError('Spustite server (npm start) a otvorte http://localhost:3000');
				return;
			}

			try {
				// redirectTo musí byť v Supabase Dashboard → Auth → URL Configuration (pridaj svoju URL)
				const { data, error } = await supabase.auth.signInWithOAuth({
					provider: 'google',
					options: { redirectTo: origin + '/login.html' }
				});
				if (error) throw error;
				if (data?.url) {
					window.location.href = data.url;
					return;
				}
				throw new Error('Google nie je zapnutý v Supabase. Dashboard → Authentication → Providers.');
			} catch (err) {
				console.error('[Login]', err);
				resetGoogleButton();
				showError(err.message || 'Prihlásenie zlyhalo.');
			}
		}

		// Event listeners
		document.getElementById('btn-google')?.addEventListener('click', loginGoogle);

		// Setup hint — zobraz presnú URL pre Supabase Redirect URLs
		(function initSetupHint() {
			const redirectUrl = (window.location.origin || '') + '/login.html';
			const display = document.getElementById('redirect-url-display');
			const copyBtn = document.getElementById('btn-copy-url');
			if (display) display.textContent = redirectUrl;
			if (copyBtn) copyBtn.addEventListener('click', function() {
				navigator.clipboard.writeText(redirectUrl).then(function() {
					copyBtn.textContent = 'Skopírované!';
					setTimeout(function() { copyBtn.textContent = 'Skopírovať'; }, 2000);
				});
			});
		})();

		// Inicializácia session
		if (supabase && !checkOAuthError()) {
			supabase.auth.getSession().then(({ data: { session } }) => {
				if (session?.user) saveUserAndRedirect(session.user);
			});
			supabase.auth.onAuthStateChange((event, session) => {
				if ((event === 'SIGNED_IN' || event === 'INITIAL_SESSION') && session?.user) {
					saveUserAndRedirect(session.user);
				}
			});
		}
	})();
	</script>

</body>
</html>
